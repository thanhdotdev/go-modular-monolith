services:
  postgres:
    image: postgres:16-alpine
    container_name: project-example-postgres
    environment:
      POSTGRES_DB: project_example
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - project-example-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d project_example"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  project-example-postgres-data:
